<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Girlfriend?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-hearts" id="background-hearts"></div>
    <div class="card">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/200" class="bear-gif">
            <!-- Bear Head -->
            <circle cx="100" cy="110" r="70" fill="#a0522d" />

            <!-- Ears -->
            <circle cx="45" cy="55" r="25" fill="#a0522d" />
            <circle cx="45" cy="55" r="15" fill="#eecfa1" />
            <circle cx="155" cy="55" r="25" fill="#a0522d" />
            <circle cx="155" cy="55" r="15" fill="#eecfa1" />

            <!-- Inner Face -->
            <ellipse cx="100" cy="120" rx="45" ry="35" fill="#eecfa1" />

            <!-- Eyes -->
            <circle cx="75" cy="100" r="8" fill="#333" />
            <circle cx="125" cy="100" r="8" fill="#333" />
            <!-- Eye Highlights -->
            <circle cx="72" cy="97" r="3" fill="white" />
            <circle cx="122" cy="97" r="3" fill="white" />

            <!-- Blush -->
            <ellipse cx="60" cy="115" rx="10" ry="5" fill="#ffb6c1" opacity="0.6" />
            <ellipse cx="140" cy="115" rx="10" ry="5" fill="#ffb6c1" opacity="0.6" />

            <!-- Nose Base -->
            <ellipse cx="100" cy="115" rx="12" ry="8" fill="#333" />
            <!-- Nose Highlight -->
            <ellipse cx="100" cy="112" rx="5" ry="2" fill="white" opacity="0.4" />

            <!-- Mouth -->
            <path d="M 90 125 Q 100 135 110 125" stroke="#333" stroke-width="2" fill="transparent"
                stroke-linecap="round" />
        </svg>
        <h1 class="question">Will you be my Girlfriend?</h1>
        <div class="button-container">
            <button id="yes-btn" class="btn yes-btn">Yes</button>
            <button id="no-btn" class="btn no-btn">No</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
